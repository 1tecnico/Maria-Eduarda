<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --roxo:#8b5cf6;
    --roxo-escuro:#5b21b6;
    --violeta:#ede9fe;
    --amarelo:#fef9c3;
}

body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,var(--violeta),var(--roxo));
}

/* TELA INICIAL */
#inicio{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.inicio-box{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

/* APP */
#app{
    display:none;
}

header{
    background:var(--roxo-escuro);
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}

button{
    background:var(--roxo);
    color:white;
    border:none;
    padding:8px;
    border-radius:8px;
    margin-top:5px;
    cursor:pointer;
}

button:hover{
    background:var(--roxo-escuro);
}

.materias{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
}

.diario{
    background:var(--amarelo);
    padding:8px;
    margin-top:5px;
    border-radius:8px;
}

.meta{
    background:var(--violeta);
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div id="inicio">
<div class="inicio-box">
<h2>Bem-vinda Maria Eduarda! 💜</h2>
<button onclick="entrar()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<header>📚 Mochila Digital MAX</header>

<div class="container">

<h3>🎯 Meta de Estudo</h3>
<input id="metaInput" placeholder="Ex: estudar 2h por dia">
<button onclick="addMeta()">Salvar Meta</button>
<div id="metas"></div>

<h3>📊 Produtividade</h3>
<canvas id="grafico"></canvas>

<h3>📅 Calendário</h3>
<input type="date" id="dataSelecionada">

<h3>📚 Matérias</h3>
<input id="novaMateria" placeholder="Nova matéria">
<button onclick="addMateria()">Adicionar</button>

<div id="materias" class="materias"></div>

<button onclick="exportar()">📁 Exportar Dados</button>

</div>
</div>

<script>

let dados = JSON.parse(localStorage.getItem("max")) || {
    materias:[],
    metas:[]
};

/* ENTRAR */
function entrar(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("app").style.display="block";
    render();
    gerarGrafico();
}

/* SALVAR */
function salvar(){
    localStorage.setItem("max", JSON.stringify(dados));
}

/* META */
function addMeta(){
    let texto = document.getElementById("metaInput").value;
    if(!texto) return;

    dados.metas.push(texto);
    salvar();
    render();
}

function renderMetas(){
    let div = document.getElementById("metas");
    div.innerHTML="";
    dados.metas.forEach(m=>{
        div.innerHTML += `<div class="meta">${m}</div>`;
    });
}

/* MATÉRIA */
function addMateria(){
    let nome = document.getElementById("novaMateria").value;
    if(!nome) return;

    dados.materias.push({nome, diarios:[]});
    salvar();
    render();
}

/* DIÁRIO */
function addDiario(i){
    let texto = prompt("O que estudou?");
    if(!texto) return;

    let data = document.getElementById("dataSelecionada").value || new Date().toISOString().split("T")[0];

    dados.materias[i].diarios.push({texto,data});
    salvar();
    render();
    gerarGrafico();
}

/* RENDER */
function render(){
    renderMetas();

    let container = document.getElementById("materias");
    container.innerHTML="";

    dados.materias.forEach((m,i)=>{
        let html = `
        <div class="card">
        <h3>${m.nome}</h3>
        <button onclick="addDiario(${i})">+ Diário</button>
        `;

        m.diarios.forEach(d=>{
            html+=`
            <div class="diario">
            📅 ${d.data}<br>
            ${d.texto}
            </div>
            `;
        });

        html+=`</div>`;
        container.innerHTML+=html;
    });
}

/* GRÁFICO */
function gerarGrafico(){
    let contagem = {};

    dados.materias.forEach(m=>{
        m.diarios.forEach(d=>{
            contagem[d.data] = (contagem[d.data] || 0) + 1;
        });
    });

    new Chart(document.getElementById("grafico"), {
        type:'bar',
        data:{
            labels:Object.keys(contagem),
            datasets:[{
                label:'Estudos por dia',
                data:Object.values(contagem)
            }]
        }
    });
}

/* EXPORTAR */
function exportar(){
    let blob = new Blob([JSON.stringify(dados)], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "backup_mochila.json";
    a.click();
}

</script>

</body>
</html>
