<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital PRO</title>

<style>
:root{
    --roxo-principal:#b185db;
    --roxo-claro:#e0aaff;
    --lilas:#f3e8ff;
    --roxo-escuro:#7b2cbf;
}

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,var(--lilas),#ffffff);
}

header{
    background: var(--roxo-principal);
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.container{
    width:95%;
    max-width:1200px;
    margin:30px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card h2{
    color:var(--roxo-escuro);
}

input, select{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:var(--roxo-principal);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:var(--roxo-escuro);
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:var(--roxo-claro);
    margin-top:8px;
    padding:8px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

.delete{
    background:#ff6b6b;
    padding:4px 8px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:800px){
    .grid{
        grid-template-columns:1fr;
    }
}

footer{
    text-align:center;
    padding:15px;
    background:var(--roxo-principal);
    color:white;
    margin-top:40px;
}
</style>
</head>
<body>

<header>
🎒 Mochila Digital PRO
</header>

<div class="container">

<div class="card">
<h2>Informações Escolares</h2>
<input type="text" id="anoEscolar" placeholder="Ex: 2º Ano Ensino Médio">
<button onclick="salvarAno()">Salvar Ano Escolar</button>
<p id="anoSalvo"></p>
</div>

<div class="grid">

<div class="card">
<h2>Adicionar Matéria</h2>
<input type="text" id="novaMateria" placeholder="Nome da matéria">
<button onclick="addMateria()">Adicionar</button>
<div id="materias"></div>
</div>

<div class="card">
<h2>Calendário de Provas</h2>
<input type="date" id="dataProva">
<input type="text" id="nomeProva" placeholder="Nome da prova">
<button onclick="addProva()">Adicionar Prova</button>
<ul id="listaProvas"></ul>
</div>

</div>
</div>

<footer>
Sistema Escolar Organizado 💜
</footer>

<script>

let materias = JSON.parse(localStorage.getItem("materiasPro")) || [];
let provas = JSON.parse(localStorage.getItem("provasPro")) || [];
let ano = localStorage.getItem("anoPro") || "";

document.getElementById("anoSalvo").innerText = ano;

function salvarTudo(){
    localStorage.setItem("materiasPro",JSON.stringify(materias));
    localStorage.setItem("provasPro",JSON.stringify(provas));
}

function salvarAno(){
    ano = document.getElementById("anoEscolar").value;
    localStorage.setItem("anoPro",ano);
    document.getElementById("anoSalvo").innerText = "Ano salvo: "+ano;
}

function addMateria(){
    const nome = document.getElementById("novaMateria").value.trim();
    if(nome==="") return;
    materias.push({nome:nome,conteudos:[]});
    document.getElementById("novaMateria").value="";
    salvarTudo();
    renderMaterias();
}

function addConteudo(index){
    const texto = document.getElementById("conteudo-"+index).value.trim();
    if(texto==="") return;
    materias[index].conteudos.push(texto);
    salvarTudo();
    renderMaterias();
}

function delMateria(index){
    materias.splice(index,1);
    salvarTudo();
    renderMaterias();
}

function delConteudo(m,c){
    materias[m].conteudos.splice(c,1);
    salvarTudo();
    renderMaterias();
}

function renderMaterias(){
    const div = document.getElementById("materias");
    div.innerHTML="";
    materias.forEach((m,index)=>{
        let html=`
        <div class="card">
        <h3>${m.nome}</h3>
        <input type="text" id="conteudo-${index}" placeholder="Adicionar conteúdo">
        <button onclick="addConteudo(${index})">Adicionar</button>
        <button onclick="delMateria(${index})" style="background:#ff6b6b;margin-left:5px;">Excluir Matéria</button>
        <ul>`;
        m.conteudos.forEach((c,i)=>{
            html+=`<li>${c} <span class="delete" onclick="delConteudo(${index},${i})">X</span></li>`;
        });
        html+=`</ul></div>`;
        div.innerHTML+=html;
    });
}

function addProva(){
    const data=document.getElementById("dataProva").value;
    const nome=document.getElementById("nomeProva").value;
    if(data===""||nome==="") return;
    provas.push({data,nome});
    salvarTudo();
    renderProvas();
}

function delProva(i){
    provas.splice(i,1);
    salvarTudo();
    renderProvas();
}

function renderProvas(){
    const ul=document.getElementById("listaProvas");
    ul.innerHTML="";
    provas.forEach((p,i)=>{
        ul.innerHTML+=`<li>${p.data} - ${p.nome} <span class="delete" onclick="delProva(${i})">X</span></li>`;
    });
}

renderMaterias();
renderProvas();

</script>

</body>
</html>
