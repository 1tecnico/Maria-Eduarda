<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital MAX Pro</title>

<style>
:root{
    --roxo:#8b5cf6;
    --roxo-escuro:#5b21b6;
    --violeta:#ede9fe;
    --amarelo:#fef9c3;
    --recente:#ffd966;
}
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,var(--violeta),var(--roxo));
}
header{
    background:var(--roxo-escuro);
    color:white;
    padding:15px;
    text-align:center;
}
.container{
    padding:20px;
}
input,textarea,select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}
button{
    background:var(--roxo);
    color:white;
    border:none;
    padding:8px;
    border-radius:8px;
    margin-top:5px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:var(--roxo-escuro);
    transform:scale(1.05);
}
.materias{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
    margin-top:10px;
}
.card{
    background:white;
    padding:15px;
    border-radius:15px;
}
.diario{
    background:var(--amarelo);
    padding:8px;
    margin-top:5px;
    border-radius:8px;
}
.diario.recente{
    background:var(--recente);
}
.categoria{
    margin-top:20px;
}
.categoria h3{
    background:var(--roxo);
    color:white;
    padding:8px;
    border-radius:10px;
    text-align:center;
}
#filtros button{
    margin-right:5px;
}
</style>
</head>
<body>
<header>📚 Mochila Digital MAX Pro</header>
<div class="container">

<!-- PERFIL -->
<h3>👤 Perfil</h3>
<input id="nome" placeholder="Seu Nome">
<input id="escola" placeholder="Escola">
<input id="ano" placeholder="Ano Escolar">
<input id="social" placeholder="Dados adicionais/Redes sociais">
<button onclick="salvarPerfil()">Salvar Perfil</button>

<!-- FILTRO CATEGORIA -->
<h3>📂 Filtrar por Categoria</h3>
<div id="filtros">
<button onclick="filtroCategoria('todas')">Todas</button>
<button onclick="filtroCategoria('exatas')">Exatas</button>
<button onclick="filtroCategoria('humanas')">Humanas</button>
<button onclick="filtroCategoria('tecnico')">Curso Técnico</button>
<button onclick="filtroCategoria('itinerario')">Itinerário</button>
</div>

<!-- ADICIONAR MATÉRIA -->
<h3>📚 Adicionar Matéria</h3>
<input id="novaMateria" placeholder="Nome da matéria">
<select id="categoriaMateria">
    <option value="exatas">Exatas</option>
    <option value="humanas">Humanas</option>
    <option value="tecnico">Curso Técnico</option>
    <option value="itinerario">Itinerário</option>
</select>
<select id="posicaoMateria">
    <option value="fim">Adicionar no final</option>
    <option value="inicio">Adicionar no início</option>
</select>
<button onclick="addMateria()">Adicionar</button>

<div id="materiasContainer"></div>

<script>
let dados = JSON.parse(localStorage.getItem('mochilaPro')) || {
    perfil:{},
    materias:{ exatas:[], humanas:[], tecnico:[], itinerario:[] }
};

let filtroAtual = 'todas';

/* PERFIL */
function salvarPerfil(){
    dados.perfil = {
        nome:document.getElementById('nome').value,
        escola:document.getElementById('escola').value,
        ano:document.getElementById('ano').value,
        social:document.getElementById('social').value
    };
    localStorage.setItem('mochilaPro',JSON.stringify(dados));
    alert('Perfil salvo!');
}
function carregarPerfil(){
    document.getElementById('nome').value = dados.perfil.nome||'';
    document.getElementById('escola').value = dados.perfil.escola||'';
    document.getElementById('ano').value = dados.perfil.ano||'';
    document.getElementById('social').value = dados.perfil.social||'';
}

/* MATÉRIAS */
function addMateria(){
    let nome = document.getElementById('novaMateria').value;
    if(!nome) return;
    let categoria = document.getElementById('categoriaMateria').value;
    let posicao = document.getElementById('posicaoMateria').value;
    let materia = {nome:nome, diarios:[]};
    if(posicao==='inicio') dados.materias[categoria].unshift(materia);
    else dados.materias[categoria].push(materia);
    document.getElementById('novaMateria').value='';
    salvar();
    render();
}

function excluirMateria(categoria,index){
    if(confirm('Deseja realmente excluir esta matéria?')){
        dados.materias[categoria].splice(index,1);
        salvar();
        render();
    }
}

/* DIÁRIO */
function addDiario(categoria,i){
    let texto = prompt('O que estudou?');
    if(!texto) return;
    let data = new Date().toLocaleDateString();
    let diario = {texto,textoOriginal:texto,data,recente:true};
    dados.materias[categoria][i].diarios.unshift(diario); // topo da lista
    salvar();
    render();
}
function excluirDiario(categoria,i,j){
    if(confirm('Deseja realmente excluir esta tarefa?')){
        dados.materias[categoria][i].diarios.splice(j,1);
        salvar();
        render();
    }
}

/* FILTRO */
function filtroCategoria(cat){
    filtroAtual = cat;
    render();
}

/* SALVAR */
function salvar(){
    localStorage.setItem('mochilaPro',JSON.stringify(dados));
}

/* RENDER */
function render(){
    carregarPerfil();
    let container = document.getElementById('materiasContainer');
    container.innerHTML='';
    for(let cat in dados.materias){
        if(filtroAtual!=='todas' && filtroAtual!==cat) continue;
        if(dados.materias[cat].length===0) continue;
        let divCat = document.createElement('div');
        divCat.className='categoria';
        divCat.innerHTML=`<h3>${cat.toUpperCase()}</h3>`;
        dados.materias[cat].forEach((m,i)=>{
            let div = document.createElement('div');
            div.className='card';
            let html = `<h4>${m.nome}</h4>
            <button onclick="addDiario('${cat}',${i})">+ Tarefa</button>
            <button onclick="excluirMateria('${cat}',${i})">Excluir Matéria</button>`;
            m.diarios.forEach((d,j)=>{
                html+=`<div class="diario ${d.recente?'recente':''}">
                📅 ${d.data}<br>${d.texto}<br>
                <button onclick="excluirDiario('${cat}',${i},${j})">Excluir Tarefa</button>
                </div>`;
                d.recente=false;
            });
            div.innerHTML=html;
            divCat.appendChild(div);
        });
        container.appendChild(divCat);
    }
}

carregarPerfil();
render();
</script>
</body>
</html>
```
