<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital PRO</title>

<style>
:root{
    --violeta:#e6e0ff;
    --roxo:#9f7aea;
    --roxo-escuro:#6b46c1;
    --amarelo:#fff9c4;
}

body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,var(--violeta),var(--roxo));
}

/* HEADER */
header{
    background:var(--roxo-escuro);
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

/* CONTAINER */
.container{
    padding:20px;
}

/* PERFIL */
.perfil{
    background:var(--amarelo);
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    margin-top:5px;
    padding:8px;
    border-radius:8px;
    border:none;
}

/* BOTÕES */
button{
    background:var(--roxo);
    color:white;
    border:none;
    padding:8px;
    border-radius:8px;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    background:var(--roxo-escuro);
}

/* GRID */
.materias{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.conteudo{
    background:var(--violeta);
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.diario{
    background:var(--amarelo);
    padding:8px;
    border-radius:8px;
    margin-top:8px;
}

/* SEARCH */
.search{
    margin-bottom:15px;
}
</style>

</head>
<body>

<header>📚 Mochila Digital PRO</header>

<div class="container">

<div class="perfil">
<h3>👤 Dados Pessoais</h3>
<input id="nome" placeholder="Nome">
<input id="ano" placeholder="Ano Escolar">
<input id="social" placeholder="Redes sociais">
</div>

<input id="search" class="search" placeholder="🔍 Buscar matéria..." oninput="render()">

<input id="novaMateria" placeholder="Nova matéria">
<button onclick="addMateria()">Adicionar</button>

<div id="materias" class="materias"></div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("mochila")) || {
    perfil:{},
    materias:[]
};

/* SALVAR */
function salvar(){
    dados.perfil = {
        nome:document.getElementById("nome").value,
        ano:document.getElementById("ano").value,
        social:document.getElementById("social").value
    };

    localStorage.setItem("mochila", JSON.stringify(dados));
}

/* CARREGAR PERFIL */
function carregarPerfil(){
    document.getElementById("nome").value = dados.perfil.nome || "";
    document.getElementById("ano").value = dados.perfil.ano || "";
    document.getElementById("social").value = dados.perfil.social || "";
}

/* MATÉRIA */
function addMateria(){
    let nome = document.getElementById("novaMateria").value;
    if(!nome) return;

    dados.materias.push({nome, conteudos:[]});
    document.getElementById("novaMateria").value="";
    salvar();
    render();
}

function excluirMateria(i){
    dados.materias.splice(i,1);
    salvar();
    render();
}

/* CONTEÚDO */
function addConteudo(i){
    let nome = prompt("Nome do conteúdo:");
    if(!nome) return;

    dados.materias[i].conteudos.push({
        nome,
        data:"",
        diarios:[]
    });

    salvar();
    render();
}

function excluirConteudo(i,j){
    dados.materias[i].conteudos.splice(j,1);
    salvar();
    render();
}

/* DIÁRIO */
function addDiario(i,j){
    let texto = prompt("O que você fez hoje?");
    if(!texto) return;

    dados.materias[i].conteudos[j].diarios.push({
        data:new Date().toLocaleDateString(),
        texto
    });

    salvar();
    render();
}

function excluirDiario(i,j,k){
    dados.materias[i].conteudos[j].diarios.splice(k,1);
    salvar();
    render();
}

/* RENDER */
function render(){
    salvar();

    let busca = document.getElementById("search").value.toLowerCase();
    let container = document.getElementById("materias");
    container.innerHTML="";

    dados.materias.forEach((mat,i)=>{

        if(!mat.nome.toLowerCase().includes(busca)) return;

        let div = document.createElement("div");
        div.className="card";

        let html = `
        <h3>${mat.nome}</h3>
        <button onclick="addConteudo(${i})">+ Conteúdo</button>
        <button onclick="excluirMateria(${i})">🗑</button>
        `;

        mat.conteudos.forEach((c,j)=>{
            html+=`
            <div class="conteudo">
            <strong>${c.nome}</strong><br>
            <button onclick="addDiario(${i},${j})">+ Diário</button>
            <button onclick="excluirConteudo(${i},${j})">🗑</button>
            `;

            c.diarios.forEach((d,k)=>{
                html+=`
                <div class="diario">
                📅 ${d.data}<br>
                ${d.texto}<br>
                <button onclick="excluirDiario(${i},${j},${k})">Excluir</button>
                </div>
                `;
            });

            html+=`</div>`;
        });

        div.innerHTML = html;
        container.appendChild(div);
    });
}

/* AUTO SAVE */
setInterval(salvar,2000);

carregarPerfil();
render();

</script>

</body>
</html>
